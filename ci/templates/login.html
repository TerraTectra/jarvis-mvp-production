<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему | Jarvis CI/CD</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="/static/css/auth.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-robot"></i> Jarvis CI/CD
                </div>
                <h1 class="auth-title">Вход в систему</h1>
                <p class="auth-subtitle">Введите ваши учетные данные для доступа к панели управления</p>
            </div>

            <form id="loginForm" class="space-y-4">
                <div class="form-group">
                    <label for="username" class="form-label">Имя пользователя</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-user text-gray-400"></i>
                        </div>
                        <input type="text" id="username" name="username" class="form-input pl-10" 
                               placeholder="Введите имя пользователя" required>
                    </div>
                </div>

                <div class="form-group">
                    <div class="flex justify-between items-center">
                        <label for="password" class="form-label">Пароль</label>
                        <a href="#" class="text-sm text-blue-600 hover:text-blue-800">Забыли пароль?</a>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400"></i>
                        </div>
                        <input type="password" id="password" name="password" class="form-input pl-10" 
                               placeholder="Введите пароль" required>
                    </div>
                </div>

                <div id="error-message" class="error-message"></div>

                <button type="submit" id="submit-button" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt mr-2"></i> Войти
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-gray-600">
                <p>По вопросам доступа обратитесь к администратору системы</p>
            </div>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
</body>
</html>
