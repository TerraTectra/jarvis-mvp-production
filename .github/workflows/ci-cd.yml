name: CI/CD Pipeline

on:
  push:
    branches: 
      - main
      - develop
  pull_request:
    branches: 
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20.x'
  DOCKER_BUILDKIT: 1

jobs:
  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run linters
      run: |
        pip install black flake8 mypy
        black --check .
        flake8 .
        mypy .

  test:
    name: Run tests
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    - name: Run tests
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
      run: |
        pytest --cov=./ --cov-report=xml
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        fail_ci_if_error: false

  deploy-staging:
    name: Deploy to Staging
    needs: [test]
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
    - uses: actions/checkout@v3
    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
    - name: Deploy to Staging
      run: |
        echo "Deploying to staging..."
        # Add your deployment commands here
        # Example:
        # rsync -avz -e "ssh -o StrictHostKeyChecking=no" \
        #   --exclude '.git' \
        #   --exclude '.github' \
        #   ./ ${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_HOST }}:/path/to/app/
    - name: Run smoke tests
      run: |
        echo "Running smoke tests against staging..."
        # Add your smoke test commands here

  deploy-production:
    name: Deploy to Production
    needs: [deploy-staging]
    if: (github.ref == 'refs/heads/main' || github.event.inputs.environment == 'production') && github.event.inputs.environment != 'staging'
    runs-on: ubuntu-latest
    environment: production
    steps:
    - uses: actions/checkout@v3
    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
    - name: Deploy to Production
      run: |
        echo "Deploying to production..."
        # Add your deployment commands here
    - name: Run smoke tests
      run: |
        echo "Running smoke tests against production..."
        # Add your smoke test commands here

  notify:
    name: Notify Status
    needs: [deploy-staging, deploy-production]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Send notification
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
          *${{ github.workflow }} - ${{ github.event_name }}*
          
          *Status*: ${{ needs.deploy-production.result || needs.deploy-staging.result || 'success' }}
          *Branch*: ${{ github.ref }}
          *Commit*: ${{ github.sha }}
          *Run URL*: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
