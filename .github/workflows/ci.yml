name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run every day at midnight UTC
    - cron: '0 0 * * *'

env:
  PYTHON_VERSION: '3.9'
  POETRY_VERSION: '1.5.1'
  DOCKER_BUILDKIT: 1

jobs:
  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade setuptools wheel
        pip install pre-commit
        pre-commit install
    
    - name: Run pre-commit
      run: pre-commit run --all-files --show-diff-on-failure
    
    - name: Run mypy
      run: |
        pip install mypy
        mypy src tests --strict

  test:
    name: Run tests
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    services:
      # Add any required services here (e.g., PostgreSQL, Redis)
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        # Add health checks
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade setuptools wheel
        pip install -e .[dev]
    
    - name: Run tests with pytest
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
      run: |
        pytest -v --cov=src --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      if: github.event_name != 'pull_request' && github.event_name != 'schedule'
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        fail_ci_if_error: false

  docker:
    name: Build and test Docker image
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ github.repository }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Test Docker image
      run: |
        docker build -t jarvis-mvp-ci-test .
        docker run --rm jarvis-mvp-ci-test --help

  stress-test:
    name: Run Stress Tests
    needs: [test, docker]
    # Run on schedule, manual trigger, or when workflow_dispatch is triggered
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'))
    
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        npm install
    
    - name: Create reports directory
      run: mkdir -p tests/reports
    
    - name: Run stress tests
      id: stress-test
      continue-on-error: true  # Continue even if tests fail
      run: |
        node tests/run_stress_test.js
        # If the script doesn't exit with 0, we'll still want to upload the report
        echo "status=$?" >> $GITHUB_OUTPUT
    
    - name: Upload test report
      uses: actions/upload-artifact@v3
      with:
        name: stress-test-report
        path: tests/reports/*.json
        retention-days: 7
    
    - name: Send Telegram notification
      if: always()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO || '' }}
        token: ${{ secrets.TELEGRAM_TOKEN || '' }}
        message: |
          *Stress Test Results*
          
          *Repository*: ${{ github.repository }}
          *Run URL*: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          *Status*: ${{ steps.stress-test.outcome == 'success' && '✅ Success' || '❌ Failed' }}
          *Report*: Available in GitHub Actions artifacts
          
          View full report in GitHub Actions.
        parse_mode: markdown

  deploy:
    name: Deploy to production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint, test, docker, stress-test]
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install SSH key
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        known_hosts: 'just-a-placeholder-so-we-dont-get-errors'
    
    - name: Deploy to production
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      env:
        HOST: ${{ secrets.PRODUCTION_HOST || '' }}
        USER: ${{ secrets.PRODUCTION_USER || '' }}
        KEY: ${{ secrets.SSH_PRIVATE_KEY || '' }}
      run: |
        if [ -z "$HOST" ] || [ -z "$USER" ] || [ -z "$KEY" ]; then
          echo "Skipping deployment: Missing required secrets"
          exit 0
        fi
        
        echo "Deploying to production..."
        # Add your deployment commands here
        # Example:
        # rsync -avz -e "ssh -i $KEY" --exclude '.git' --exclude '.github' ./ $USER@$HOST:/path/to/deploy/
        # ssh -i $KEY $USER@$HOST 'cd /path/to/deploy && docker-compose up -d --build'
