name: Kwork Integration Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/kwork/**'
      - 'tests/test_order_processing_simple.py'
      - '.github/workflows/kwork-integration-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/kwork/**'
      - 'tests/test_order_processing_simple.py'
      - '.github/workflows/kwork-integration-tests.yml'
  workflow_dispatch:

jobs:
  test:
    name: Run Kwork Integration Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov
    
    - name: Run tests
      env:
        DATABASE_URL: postgresql://test:test@localhost:5432/test_db
        KWORK_TOKEN: ${{ secrets.KWORK_TEST_TOKEN }}
        DRY_RUN: 'true'
      run: |
        python -m pytest tests/test_order_processing_simple.py -v --cov=src --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
    
    - name: Notify on failure
      if: failure()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          ❌ Kwork Integration Tests Failed
          Workflow: ${{ github.workflow }}
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
