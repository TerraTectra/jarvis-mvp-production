global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'jarvis-app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8000']  # Update with your app's host and metrics port

  - job_name: 'github-actions'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:9099']  # GitHub Actions metrics exporter

rule_files:
  - 'alerts.yml'
